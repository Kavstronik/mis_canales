name: Update TC Link
on:
  schedule:
    - cron: '0 */3 * * *' # Corre cada 3 horas
  workflow_dispatch:      # Para que puedas darle al botón de "Play" manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run update script
        run: python update_tc.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add canales.json
          git commit -m "Update TC link" || echo "No hay cambios para subir"
          git push
