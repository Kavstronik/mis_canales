name: Actualizar Links Automáticamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch:      # Botón para ejecutar manual en la pestaña Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # IMPORTANTE: permiso para que el robot escriba en tu repo
    steps:
      - uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        run: python update_links.py

      - name: Subir cambios a GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add canales.json
          git commit -m "🤖 Update: Link dinámico de TC Televisión" || echo "Sin cambios"
          git push
